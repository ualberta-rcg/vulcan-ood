description: |
  Launch [IGV (Integrative Genomics Viewer)] on the Vulcan high-performance computing (HPC) cluster using the shared CVMFS software stack.

  You interact with the IGV GUI through a VNC session (optional full desktop: none, GNOME, MATE, or XFCE). Choose an IGV module version on the form; GPU acceleration is available if selected and supported on the node.

  [IGV (Integrative Genomics Viewer)]: https://igv.org/

  Developed by Arlo Ludwig, University of Alberta IST ([Sensitive Data Research Environment (SDRE)](https://www.ualberta.ca/en/information-services-and-technology/initiatives/sensitive-data-research-environment.html)).
