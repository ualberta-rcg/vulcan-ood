---
name: GPT4All
category: Interactive Apps
subcategory: AI/ML
role: batch_connect
description: |
  Launch [GPT4All] on the [Vulcan] HPC cluster to run a local LLM (Llama, Mistral,
  etc.) fully offline — no API keys, no cloud. Chat via a Gradio web interface.

  The GPT4All environment installs into your `$SCRATCH` on first launch and is
  reused thereafter. Operated by [AMII], the [University of Alberta], and supported
  by the [Digital Research Alliance of Canada].

  [GPT4All]: https://gpt4all.io/
  [AMII]: https://www.amii.ca/
  [University of Alberta]: https://www.ualberta.ca/
  [Digital Research Alliance of Canada]: https://alliancecan.ca/en
  [Vulcan]: https://docs.alliancecan.ca/wiki/Vulcan
