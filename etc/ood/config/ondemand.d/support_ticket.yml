# Two different "email" pieces:
# - attributes.email: hidden field; value filled via ERB from ~/ondemand/oidc_email.txt (same as batch connect).
# - email: below = SMTP delivery (to, relay, etc.) — required; do not remove.
#
# ERB runs when this user's dashboard loads merged config (PUN runs as the Unix user, so ~ is correct).
# If the file was missing on first load, restart the web server (Help → Restart Web Server) after login.
<%-
  emailaddr = File.read(File.expand_path('~/ondemand/oidc_email.txt')).strip rescue ''
-%>

support_ticket:
  description: |
    Submit a support request for Eureka Open OnDemand. Include steps to reproduce,
    error text, and optionally screenshots/log snippets.

  attributes:
    email:
      widget: hidden_field
      required: true
      skip_label: true
      cacheable: false
      value: <%= emailaddr.inspect %>

  attachments:
    max_items: 4
    max_size: 6291456

  email:
    to: "rschsppt+eureka@ualberta.ca"
    delivery_method: "smtp"
    delivery_settings:
      address: "smtp.ualberta.ca"
      port: 25
      domain: "ualberta.ca"
      enable_starttls_auto: true
      open_timeout: 15
      read_timeout: 15
