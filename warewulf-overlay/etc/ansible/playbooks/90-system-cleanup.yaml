---
################################################################################
# System cleanup on the OOD login node
################################################################################
# Purpose: codify system-level fixes that were applied live (and would be lost
# on reboot of a stateless Warewulf node). Static files (cron schedules, node
# binaries, sudoers) are delivered by the Warewulf overlay instead — this
# playbook holds only ACTIONS/LOGIC (service masking, cruft removal).
# Runs after 78-deploy-ood-server.
################################################################################

- name: System cleanup on the OOD login node
  hosts: localhost
  become: true

  tasks:

    # NOTE: TLS hardening (cipher/protocol directives) lives in the example/
    # staging ood_portal.yml (ssl: block), applied by playbook 78's regen. The
    # 2048-bit DH params are generated at boot in playbook 78 (before regen, so
    # SSLOpenSSLConfCmd resolves at apache startup).

    # ── Normalize OOD app perms (apps deploy with the repo's source modes,
    #    which can leave dirs non-traversable, e.g. template/desktops/ at 0750,
    #    and break batch_connect staging with "rsync opendir Permission denied").
    #    Dirs 0755, .sh/.sh.erb executable, other files 0644.
    - name: Normalize OOD app permissions
      ansible.builtin.shell: |
        find /var/www/ood/apps -type d -exec chmod 755 {} \;
        find /var/www/ood/apps -type f \( -name "*.sh" -o -name "*.sh.erb" \) -exec chmod 755 {} \;
        find /var/www/ood/apps -type f ! \( -name "*.sh" -o -name "*.sh.erb" \) -exec chmod 644 {} \;
      args:
        executable: /bin/bash
      changed_when: false

    # ── Mask cosmetic services that fail on an OOD login node ──────────────
    - name: Mask unneeded services (reduce failed-unit noise)
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
      loop:
        - motd-news.service        # Ubuntu Canonical MOTD ads
        - openipmi.service         # no BMC/IPMI hardware on this node
        - postfix@-.service        # SysV-init wrapper that races the spool dir at boot
                                   # (the real postfix.service is unaffected)

    # ── Safety net: strip any gen_*.sh scripts mis-placed in /etc/cron.d ──
    # Root cause is fixed (playbook 78 no longer copies scripts there); this just
    # cleans up systems that ran an older 78. No-op on fresh nodes.
    - name: Remove any bogus generator scripts from /etc/cron.d
      ansible.builtin.file:
        path: "/etc/cron.d/{{ item }}"
        state: absent
      loop:
        - gen_cluster_rb.sh
        - gen_gpu_rb.sh
        - gen_app_rb.sh

    # ── Remove dpkg conffile leftovers from package upgrades ───────────────
    - name: Clean dpkg conffile cruft (.dpkg-tmp / .dpkg-dist)
      ansible.builtin.shell: find /etc \( -name '*.dpkg-tmp' -o -name '*.dpkg-dist' \) -delete
      changed_when: false
